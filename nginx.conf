# AgriTech - Configuración Nginx
# Guarda como: /etc/nginx/sites-available/agritech
# Luego: sudo ln -s /etc/nginx/sites-available/agritech /etc/nginx/sites-enabled/

server {
    listen 80;
    listen [::]:80;
    server_name tu-dominio.com www.tu-dominio.com;
    # Redirigir HTTP a HTTPS (descomenta si tienes SSL)
    # return 301 https://$server_name$request_uri;

    root /var/www/agritech;
    index index.html;

    # Compresión GZIP
    gzip on;
    gzip_types text/html text/css application/javascript application/json;
    gzip_min_length 1024;

    # Headers de seguridad
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    # Caché para assets estáticos
    location ~* \.(js|css|png|jpg|jpeg|ico|woff2)$ {
        expires 1M;
        add_header Cache-Control "public, immutable";
    }

    # Service Worker - no cachear
    location /sw.js {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}

